<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>流浪动物风险管理系统 | 公共安全与疫病防控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #fefaf5 0%, #fff3e6 100%);
        }

        .search-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
        }

        .breed-card {
            transition: transform 0.2s, box-shadow 0.2s;
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

            .breed-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
            }

        .info-label {
            font-weight: 600;
            color: #b91c1c;
            min-width: 90px;
            display: inline-block;
        }

        .result-image {
            width: 100%;
            max-height: 260px; 
            object-fit: contain; 
            background-color: #f8f2ea;
            display: block;
            margin: 0 auto;
            transition: all 0.2s ease;
        }

        .breed-card .result-image-wrapper {
            background: #f8f2ea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .no-result {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 2rem;
            color: #9a6e4b;
        }

        .risk-badge {
            background: #fee2e2;
            color: #991b1b;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: bold;
        }

        .breed-card img {
            min-height: 140px;
        }

        @media (max-width: 640px) {
            .result-image {
                max-height: 220px;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="bg-white/90 backdrop-blur-sm shadow-sm sticky top-0 z-30 border-b border-red-100">
        <div class="max-w-6xl mx-auto px-5 sm:px-8 py-4 flex flex-wrap items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-shield-alt text-2xl text-red-600"></i>
                <span class="text-xl font-bold bg-gradient-to-r from-red-800 to-amber-800 bg-clip-text text-transparent">流浪动物管理中心 · 风险防控平台</span>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='网站首页.html'" class="text-gray-600 hover:text-red-600 transition flex items-center gap-1"><i class="fas fa-home"></i> 返回首页</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 sm:px-8 py-8 md:py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-3">🐾 流浪动物危险性 & 疫病风险评估</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">输入品种名称，获取流浪状态下的攻击倾向、传染病风险、公共安全隐患及管理处置建议</p>
        </div>

        <div class="search-container rounded-2xl shadow-md p-5 mb-8 border border-red-100">
            <div class="relative max-w-2xl mx-auto">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-red-400"></i>
                <input type="text" id="searchInput" placeholder="例如：金毛、橘猫、中华田园犬、哈士奇..."
                       class="w-full pl-12 pr-24 py-3 rounded-full border border-red-200 focus:ring-2 focus:ring-red-300 focus:border-red-400 outline-none text-gray-700">
                <button id="searchBtn" class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-red-600 hover:bg-red-700 text-white px-5 py-1.5 rounded-full text-sm font-medium transition shadow-sm">风险检索</button>
            </div>
            <div class="flex justify-center gap-3 mt-4 flex-wrap">
            </div>
        </div>

        <div id="resultContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center text-gray-400 py-10">
                <i class="fas fa-paw text-4xl mb-3 opacity-30"></i>
                <p>输入流浪动物品种，获取风险档案</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-red-100 mt-12 py-6 text-center text-gray-400 text-sm">
        <i class="fas fa-shield-virus text-red-300 mr-1"></i> 数据基于流浪动物收容统计与公共卫生模型 | 护城为环，科学防控
    </footer>

    <script>
        const API_BASE = 'http://localhost:5000';
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultContainer = document.getElementById('resultContainer');

        const DEFAULT_IMG = 'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=600&h=400&fit=crop';
        // 备用图片2: 猫咪默认图
        const CAT_FALLBACK = 'https://images.unsplash.com/photo-1574158622682-e40e69881006?w=600&h=400&fit=crop';

        function showLoading() {
            resultContainer.innerHTML = `<div class="col-span-full flex justify-center py-12"><div class="loading-spinner"></div></div>`;
        }

        function showError(message) {
            resultContainer.innerHTML = `<div class="col-span-full no-result"><i class="fas fa-exclamation-triangle text-3xl text-red-400 mb-3"></i><p>${escapeHtml(message)}</p></div>`;
        }

        function getValidImageUrl(originalUrl, breedName = '') {
            if (!originalUrl || originalUrl === '' || originalUrl === 'null' || originalUrl === 'undefined') {
                if (breedName && (breedName.includes('猫') || breedName.includes('布偶') || breedName.includes('橘猫') || breedName.includes('狸花'))) {
                    return CAT_FALLBACK;
                }
                return DEFAULT_IMG;
            }
            if (originalUrl.startsWith('/')) {
                return `${API_BASE}${originalUrl}`;
            }
            if (!originalUrl.startsWith('http://') && !originalUrl.startsWith('https://')) {
                return DEFAULT_IMG;
            }
            return originalUrl;
        }

        function renderResults(breeds) {
            if (!breeds || breeds.length === 0) {
                resultContainer.innerHTML = `<div class="col-span-full no-result"><i class="fas fa-search text-3xl text-gray-400 mb-3"></i><p>未找到相关品种的风险数据，请尝试其他关键词</p></div>`;
                return;
            }

            resultContainer.innerHTML = breeds.map(breed => {
                const breedName = breed.breed || '动物';
                let imageUrl = getValidImageUrl(breed.image_url, breedName);
                if (!imageUrl) imageUrl = DEFAULT_IMG;

                return `
                    <div class="breed-card">
                        <div class="result-image-wrapper">
                            <img src="${escapeHtml(imageUrl)}"
                                 alt="${escapeHtml(breedName)} - 流浪风险评估档案"
                                 class="result-image"
                                 loading="lazy"
                                 onerror="this.onerror=null; this.src='${DEFAULT_IMG}';">
                        </div>
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-3">
                                <h2 class="text-xl font-bold text-gray-800">${escapeHtml(breedName)}</h2>
                                <span class="risk-badge"><i class="fas fa-skull-crosswalk mr-1"></i>流浪风险档案</span>
                            </div>
                            <div class="space-y-2 text-sm">
                                <div><span class="info-label"><i class="fas fa-fist-raised mr-1"></i> 危险性/攻击性：</span>${escapeHtml(breed.temperament || '暂无数据')}</div>
                                <div><span class="info-label"><i class="fas fa-biohazard mr-1"></i> 疫病传播风险：</span>${escapeHtml(breed.diet || '暂无数据')}</div>
                                <div><span class="info-label"><i class="fas fa-tools mr-1"></i> 管理/处置建议：</span>${escapeHtml(breed.care || '暂无数据')}</div>
                                <div><span class="info-label"><i class="fas fa-hourglass-half mr-1"></i> 流浪风险周期：</span>${escapeHtml(breed.lifespan || '暂无数据')}</div>
                                <div><span class="info-label"><i class="fas fa-weight-hanging mr-1"></i> 体型/威胁等级：</span>${escapeHtml(breed.size || '未知')}</div>
                                <div><span class="info-label"><i class="fas fa-tag mr-1"></i> 物种：</span>${escapeHtml(breed.species || '未知')}</div>
                            </div>
                        </div>
                    </div>
                `}).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        async function performSearch(keyword) {
            if (!keyword.trim()) {
                showError('请输入品种名称以检索流浪动物风险');
                return;
            }
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/api/breeds?keyword=${encodeURIComponent(keyword)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderResults(data);
            } catch (error) {
                console.error('检索失败:', error);
                showError('后端服务未响应，请确保风险数据库已启动 (http://localhost:5000) 或检查网络连接');
            }
        }

        searchBtn.addEventListener('click', () => performSearch(searchInput.value));
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(searchInput.value); });
        document.querySelectorAll('.hot-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const breed = tag.getAttribute('data-breed');
                searchInput.value = breed;
                performSearch(breed);
            });
        });

        window.addEventListener('load', () => {
            performSearch('金毛');
        });
    </script>
</body>
</html>
